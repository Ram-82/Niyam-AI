<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Demo | Niyam AI</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background-color: var(--white);
            border-right: 1px solid #e2e8f0;
            padding: var(--space-3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            color: var(--text-dark);
            text-decoration: none;
            transition: all 0.3s;
        }

        .sidebar-item:hover,
        .sidebar-item.active {
            background-color: #f1f5f9;
            color: var(--primary-color);
        }

        .main-content {
            padding: var(--space-4);
            background-color: #f8fafc;
        }

        .upload-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .upload-zone:hover {
            border-color: var(--primary-color);
        }

        .result-card {
            display: none;
            margin-top: 20px;
        }

        .extracted-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .extracted-label {
            color: var(--text-light);
            font-weight: 500;
        }

        .extracted-value {
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo" style="padding: 10px;">
                <img src="logo.svg" alt="Niyam AI" height="35">
            </div>
            <nav style="margin-top: 20px; flex: 1;">
                <a href="dashboard.html" class="sidebar-item">
                    <i data-feather="home"></i> Dashboard
                </a>
                <a href="ocr_demo.html" class="sidebar-item active">
                    <i data-feather="file-text"></i> OCR Demo
                </a>
                <a href="#" class="sidebar-item">
                    <i data-feather="briefcase"></i> My Business
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <h1 style="margin-bottom: 5px;">AI Document Parser</h1>
            <p style="color: var(--text-light); margin-bottom: 30px;">Upload an invoice or certificate to extract
                compliance data.</p>

            <div class="card">
                <div class="upload-zone" id="uploadZone">
                    <i data-feather="upload-cloud"
                        style="width: 48px; height: 48px; color: var(--primary-color); margin-bottom: 15px;"></i>
                    <h3>Drop your files here or click to upload</h3>
                    <p style="color: var(--text-light);">Supports PDF, JPG, PNG (Max 5MB)</p>
                    <input type="file" id="fileInput" style="display: none;">
                </div>

                <div id="processingState" style="display: none; text-align: center; padding: 40px;">
                    <div
                        style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;">
                    </div>
                    <p>AI is analyzing your document...</p>
                </div>

                <div class="result-card card" id="resultCard" style="background: #f8fafc; border: 1px solid #e2e8f0;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3 id="docType">Extracted Data</h3>
                        <span class="badge badge-success" id="complianceStatus">Verified</span>
                    </div>

                    <div id="extractedData">
                        <!-- Data rows will be injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <style>
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-success {
            background: #dcfce7;
            color: #166534;
        }
    </style>

    <script src="config.js"></script>
    <script>
        feather.replace();

        const API_URL = CONFIG.API_URL;
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const processingState = document.getElementById('processingState');
        const resultCard = document.getElementById('resultCard');
        const extractedDataDiv = document.getElementById('extractedData');

        uploadZone.onclick = () => fileInput.click();

        // Drag and drop support
        uploadZone.ondragover = (e) => { e.preventDefault(); uploadZone.style.borderColor = 'var(--primary-color)'; };
        uploadZone.ondragleave = () => { uploadZone.style.borderColor = '#cbd5e1'; };
        uploadZone.ondrop = (e) => {
            e.preventDefault();
            uploadZone.style.borderColor = '#cbd5e1';
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                processFile();
            }
        };

        fileInput.onchange = async () => {
            if (fileInput.files.length > 0) await processFile();
        };

        async function processFile() {
            const file = fileInput.files[0];
            if (!file) return;

            // Auth is optional for process-invoice
            const token = localStorage.getItem('niyam_access_token');

            uploadZone.style.display = 'none';
            processingState.style.display = 'block';
            resultCard.style.display = 'none';

            // 45s timeout for Render free tier cold starts
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 45000);

            try {
                const formData = new FormData();
                formData.append('file', file);

                console.log(`[Niyam] Sending ${file.name} (${(file.size/1024).toFixed(1)}KB) to ${API_URL}/process-invoice`);

                const headers = {};
                if (token) headers['Authorization'] = `Bearer ${token}`;

                const response = await fetch(`${API_URL}/process-invoice`, {
                    method: 'POST',
                    headers: headers,
                    body: formData,
                    signal: controller.signal,
                });

                clearTimeout(timeoutId);

                // Safe JSON parsing — server may return HTML on 502
                const responseText = await response.text();
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (e) {
                    console.error('Invalid JSON:', responseText.substring(0, 300));
                    throw new Error(
                        response.status === 502 ? 'Server is starting up — retry in 30 seconds' :
                        `Server error (HTTP ${response.status})`
                    );
                }

                if (!response.ok) {
                    throw new Error(data.error || data.detail || data.reason || `HTTP ${response.status}`);
                }

                console.log('[Niyam] Response:', data.status, 'confidence:', data.confidence_score);

                if (data.status === 'failed') {
                    throw new Error(
                        data.reason === 'OCR_FAILED' ? 'Could not read document — try a clearer image or digital PDF' :
                        data.reason || 'Processing failed'
                    );
                }

                displayResults(data);

            } catch (error) {
                clearTimeout(timeoutId);
                console.error('Processing error:', error);
                processingState.style.display = 'none';

                if (error.name === 'AbortError') {
                    showError('Request timed out — server may be cold-starting. <button onclick="processFile()" style="margin-left:8px;" class="btn btn-primary" style="padding:4px 12px;font-size:0.85rem;">Retry</button>');
                } else {
                    showError(error.message + ' <button onclick="resetUpload()" style="margin-left:8px;padding:4px 12px;font-size:0.85rem;cursor:pointer;border:1px solid #e2e8f0;border-radius:4px;background:white;">Try Again</button>');
                }
            }
        }

        function showError(message) {
            processingState.style.display = 'none';
            resultCard.style.display = 'block';
            document.getElementById('docType').innerText = 'Processing Error';
            document.getElementById('complianceStatus').style.background = '#fee2e2';
            document.getElementById('complianceStatus').style.color = '#991b1b';
            document.getElementById('complianceStatus').innerText = 'Error';
            extractedDataDiv.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-light);">' + message + '</div>';
        }

        function resetUpload() {
            uploadZone.style.display = 'block';
            processingState.style.display = 'none';
            resultCard.style.display = 'none';
            fileInput.value = '';
        }

        function fmtINR(val) {
            const n = Number(val);
            if (isNaN(n) || n === 0) return '₹0.00';
            return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function displayResults(data) {
            processingState.style.display = 'none';
            resultCard.style.display = 'block';

            document.getElementById('docType').innerText = 'Invoice Data';

            // Compliance badge
            const badge = document.getElementById('complianceStatus');
            const compliance = data.compliance || {};
            if (compliance.is_valid === true) {
                badge.innerText = 'GST Compliant';
                badge.style.background = '#dcfce7'; badge.style.color = '#166534';
            } else if (compliance.is_valid === false) {
                badge.innerText = (compliance.issues || []).length + ' Issue(s)';
                badge.style.background = '#fee2e2'; badge.style.color = '#991b1b';
            } else {
                badge.innerText = 'Processed';
                badge.style.background = '#e0e7ff'; badge.style.color = '#3730a3';
            }

            // Build data rows
            const confidence = Math.round((data.confidence_score || 0) * 100);
            const confColor = confidence >= 70 ? '#166534' : confidence >= 40 ? '#92400e' : '#991b1b';
            const gst = data.gst_breakdown || {};

            const fields = [
                ['Vendor Name', data.vendor_name],
                ['GSTIN', data.vendor_gstin],
                ['Invoice Number', data.invoice_number],
                ['Invoice Date', data.invoice_date],
                ['Taxable Value', data.taxable_value ? fmtINR(data.taxable_value) : null],
                ['Total Amount', data.total_amount ? fmtINR(data.total_amount) : null],
                ['CGST', gst.cgst ? fmtINR(gst.cgst) : null],
                ['SGST', gst.sgst ? fmtINR(gst.sgst) : null],
                ['IGST', gst.igst ? fmtINR(gst.igst) : null],
            ];

            let html = '';
            for (const [label, value] of fields) {
                if (!value && value !== 0) continue;
                html += `<div class="extracted-row">
                    <span class="extracted-label">${label}</span>
                    <span class="extracted-value">${value || 'Not detected'}</span>
                </div>`;
            }

            // Line items
            const items = data.line_items || [];
            if (items.length > 0) {
                html += '<div style="margin-top:12px;padding-top:12px;border-top:2px solid #e2e8f0;">';
                html += '<div class="extracted-row"><span class="extracted-label" style="font-weight:700;">LINE ITEMS (' + items.length + ')</span><span></span></div>';
                items.slice(0, 15).forEach(item => {
                    html += '<div class="extracted-row"><span class="extracted-label" style="padding-left:12px;">' +
                        (item.description || '-') + '</span><span class="extracted-value">' +
                        (item.amount ? fmtINR(item.amount) : '-') + '</span></div>';
                });
                html += '</div>';
            }

            // Compliance issues
            const issues = (compliance.issues || []);
            if (issues.length > 0) {
                html += '<div style="margin-top:12px;padding-top:12px;border-top:2px solid #e2e8f0;">';
                html += '<div class="extracted-row"><span class="extracted-label" style="font-weight:700;color:#991b1b;">COMPLIANCE ISSUES</span><span></span></div>';
                issues.forEach(issue => {
                    const sevColor = issue.severity === 'high' ? '#ef4444' : issue.severity === 'medium' ? '#f59e0b' : '#6b7280';
                    html += '<div style="padding:6px 0;border-bottom:1px solid #f1f5f9;">' +
                        '<span style="font-size:0.8rem;color:' + sevColor + ';font-weight:600;">' + (issue.type || '').replace(/_/g, ' ') + '</span>' +
                        '<br><span style="font-size:0.78rem;color:var(--text-light);">' + (issue.message || '') + '</span></div>';
                });
                html += '</div>';
            }

            // Confidence row
            html += `<div class="extracted-row" style="margin-top:15px;padding-top:15px;border-top:2px solid #e2e8f0;">
                <span class="extracted-label">AI CONFIDENCE</span>
                <span class="extracted-value" style="color:${confColor};">${confidence}%</span>
            </div>`;

            // OCR metadata
            const ocr = data.ocr_metadata || {};
            html += `<div class="extracted-row">
                <span class="extracted-label">OCR METHOD</span>
                <span class="extracted-value" style="font-size:0.85rem;">${ocr.method || 'auto'} (${ocr.quality || '?'})</span>
            </div>`;

            // Reset button
            html += '<div style="margin-top:15px;text-align:center;"><button onclick="resetUpload()" style="padding:8px 20px;font-size:0.85rem;cursor:pointer;border:1px solid #e2e8f0;border-radius:6px;background:white;">Upload Another Invoice</button></div>';

            extractedDataDiv.innerHTML = html;
        }
    </script>
</body>

</html>
